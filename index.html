<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FRC 6147 Scouting - Rebuilt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Match Setup -->
    <section class="page" id="page-setup">
      <h1>Match Setup</h1>
      <label>
        Team Number
        <input type="number" id="teamNumber" />
      </label>
      <label>
        Match Number
        <input type="number" id="matchNumber" />
      </label>
      <label>
        Scout Name
        <input type="text" id="scoutName" />
      </label>
      <!-- Alliance selector removed -->
      <button id="to-auto" class="primary">Next: Auto</button>
    </section>

    <!-- Auto -->
    <section class="page" id="page-auto">
      <h1>Autonomous</h1>
      <label>
        Did they move?
        <input type="checkbox" id="autoMoved" />
      </label>
      <label>
        Auto Notes
        <textarea id="autoNotes" rows="3"></textarea>
      </label>
      <div class="nav-row">
        <button class="secondary" id="back-to-setup">Back</button>
        <button class="primary" id="to-teleop">Next: Teleop</button>
      </div>
    </section>

    <!-- Teleop -->
    <section class="page" id="page-teleop">
      <h1>Teleop</h1>

      <!-- Example scoring fields (keep whatever you already had) -->
      <label>
        Teleop Scored (example)
        <input type="number" id="teleopScored" min="0" />
      </label>

      <fieldset>
        <legend>Did they play defense?</legend>
        <label><input type="radio" name="defenseLevel" value="none" checked> None</label>
        <label><input type="radio" name="defenseLevel" value="light"> Light</label>
        <label><input type="radio" name="defenseLevel" value="moderate"> Moderate</label>
        <label><input type="radio" name="defenseLevel" value="heavy"> Heavy</label>
      </fieldset>

      <div class="nav-row">
        <button class="secondary" id="back-to-auto">Back</button>
        <button class="primary" id="to-tags">Next: Tags</button>
      </div>
    </section>

    <!-- Tags / Endgame -->
    <section class="page" id="page-tags">
      <h1>Tags & Comments</h1>

      <!-- Example tags (keep whatever you already had) -->
      <fieldset>
        <legend>Tags</legend>
        <label><input type="checkbox" class="tag-checkbox" value="reliable"> Reliable</label>
        <label><input type="checkbox" class="tag-checkbox" value="fast"> Fast</label>
        <label><input type="checkbox" class="tag-checkbox" value="defense-specialist"> Defense Specialist</label>
      </fieldset>

      <label>
        Comments (optional, max 300 characters)
        <textarea id="comments" rows="4" maxlength="300"></textarea>
        <div id="comments-counter" class="counter">0 / 300</div>
      </label>

      <div class="nav-row">
        <button class="secondary" id="back-to-teleop">Back</button>
        <button class="primary" id="to-qr">Next: QR</button>
      </div>
    </section>

    <!-- QR / Email -->
    <section class="page" id="page-qr">
      <h1>QR & Email</h1>

      <button id="send-email" class="primary large">Send via Email</button>
      <div id="email-status" class="status"></div>

      <div id="qrcode"></div>

      <p class="hint">
        After sending the email, you can complete this match and start a new one.
      </p>

      <div class="nav-row">
        <button class="secondary" id="back-to-tags">Back</button>
        <button class="primary" id="done-match" disabled>Done / New Match</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
