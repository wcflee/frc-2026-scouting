<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FRC 6147 Scouting - Rebuilt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- MATCH SETUP -->
    <section class="page" id="page-setup">
      <h1>Match Setup</h1>

      <label>
        Team Number
        <input type="number" id="teamNumber">
      </label>

      <label>
        Match Number
        <input type="number" id="matchNumber">
      </label>

      <label>
        Scout Name
        <input type="text" id="scoutName">
      </label>

      <button id="to-auto" class="primary">Next: Auto</button>
    </section>

    <!-- AUTO -->
    <section class="page" id="page-auto">
      <h1>Autonomous</h1>

      <label>
        Did they move?
        <input type="checkbox" id="autoMoved">
      </label>

      <label>
        Auto % Contribution
        <input type="range" id="autoContribution" min="0" max="100" value="0">
        <span id="autoContributionValue">0%</span>
      </label>

      <label>
        Auto Climb Attempt?
        <select id="autoClimb">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <label>
        Auto Penalties?
        <select id="autoPenalties">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <label>
        Disabled in Auto?
        <select id="autoDisabled">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <div class="nav-row">
        <button class="secondary" id="back-to-setup">Back</button>
        <button class="primary" id="to-teleop">Next: Teleop</button>
      </div>
    </section>

    <!-- TELEOP -->
    <section class="page" id="page-teleop">
      <h1>Teleop</h1>

      <fieldset>
        <legend>Did they play defense?</legend>
        <label><input type="radio" name="defenseLevel" value="none" checked> None</label>
        <label><input type="radio" name="defenseLevel" value="light"> Light</label>
        <label><input type="radio" name="defenseLevel" value="moderate"> Moderate</label>
        <label><input type="radio" name="defenseLevel" value="heavy"> Heavy</label>
      </fieldset>

      <label>
        Teleop % Contribution
        <input type="range" id="teleopContribution" min="0" max="100" value="0">
        <span id="teleopContributionValue">0%</span>
      </label>

      <label>
        Teleop Penalties?
        <select id="teleopPenalties">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <label>
        Disabled in Teleop?
        <select id="teleopDisabled">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>




      
      <div class="section">
          <h3>Human Player Feeds</h3>
          <p>How many times did this robot feed the human player?</p>

          <div class="feed-buttons">
            <button type="button" class="feed-btn" data-value="0">0</button>
            <button type="button" class="feed-btn" data-value="1">1</button>
            <button type="button" class="feed-btn" data-value="2">2</button>
            <button type="button" class="feed-btn" data-value="3">3</button>
            <button type="button" class="feed-btn" data-value="4">4</button>
            <button type="button" class="feed-btn" data-value="5">5+</button>
          </div>
        </div>


      
      <div class="nav-row">
        <button class="secondary" id="back-to-auto">Back</button>
        <button class="primary" id="to-endgame">Next: Endgame</button>
      </div>
    </section>

    <!-- ENDGAME -->
    <section class="page" id="page-endgame">
      <h1>Endgame</h1>

      <label>
        Endgame Climb Level
        <select id="endgameClimb">
          <option value="none">No</option>
          <option value="level1">Level 1</option>
          <option value="level2">Level 2</option>
          <option value="level3">Level 3</option>
        </select>
      </label>

      <label>
        Endgame Penalties?
        <select id="endgamePenalties">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <label>
        Disabled in Endgame?
        <select id="endgameDisabled">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </label>

      <div class="nav-row">
        <button class="secondary" id="back-to-teleop">Back</button>
        <button class="primary" id="to-tags">Next: Tags</button>
      </div>
    </section>

    <!-- TAGS -->
    <section class="page" id="page-tags">
      <h1>Tags & Comments</h1>

      <fieldset>
        <legend>Tags</legend>
        <label><input type="checkbox" class="tag-checkbox" value="good_intake"> Good Intake</label>
        <label><input type="checkbox" class="tag-checkbox" value="weak_intake"> Weak Intake</label>
        <label><input type="checkbox" class="tag-checkbox" value="fast_cycle"> Fast Cycle</label>
        <label><input type="checkbox" class="tag-checkbox" value="slow_cycle"> Slow Cycle</label>
        <label><input type="checkbox" class="tag-checkbox" value="good_driver"> Good Driver</label>
        <label><input type="checkbox" class="tag-checkbox" value="unstable"> Unstable</label>
        <label><input type="checkbox" class="tag-checkbox" value="dead_robot"> Dead Robot</label>
      </fieldset>

      <label>
        Comments (optional, max 300 chars)
        <textarea id="comments" maxlength="300"></textarea>
        <div id="comments-counter" class="counter">0 / 300</div>
      </label>

      <div class="nav-row">
        <button class="secondary" id="back-to-endgame">Back</button>
        <button class="primary" id="to-qr">Next: QR</button>
      </div>
    </section>

    <!-- QR PAGE -->
    <section class="page" id="page-qr">
      <h1>QR & Email</h1>

      <button id="send-email" class="primary large">Send via Email</button>
      <div id="email-status" class="status"></div>

      <div id="qrcode"></div>

      <p class="hint">After sending the email, you may complete this match.</p>

      <div class="nav-row">
        <button class="secondary" id="back-to-tags">Back</button>
        <button class="primary" id="done-match" disabled>Done / New Match</button>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
